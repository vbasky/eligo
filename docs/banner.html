<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      .banner {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: linear-gradient(135deg, #fbfcfe 0%, #eef1f8 55%, #e7eaf4 100%);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: #1f2740;
      }
      /* the "lot": a faint scattered field of candidate tiles */
      #field { position: absolute; inset: 0; z-index: 0; }
      #field .tile { position: absolute; border-radius: 22%; }
      /* focal glow so the wordmark lifts cleanly off the field */
      .glow {
        position: absolute; inset: 0; z-index: 1;
        background:
          radial-gradient(closest-side at 50% 44%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.55) 38%, rgba(255,255,255,0) 70%),
          radial-gradient(closest-side at 50% 46%, rgba(239,123,62,0.10) 0%, rgba(239,123,62,0) 60%);
      }
      .content {
        position: absolute; inset: 0; z-index: 2;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
      }
      .logo {
        display: flex; align-items: center; gap: 30px;
        font-weight: 700; font-size: 132px; letter-spacing: -2px;
      }
      .logo .accent { border-bottom: 9px solid #ef7b3e; padding-bottom: 6px; }
      .tagline {
        margin-top: 42px; font-size: 31px; font-weight: 500;
        color: #3b4663; letter-spacing: 0.2px;
      }
      .chips {
        margin-top: 64px; font-size: 21px; font-weight: 600;
        color: #8b94aa; letter-spacing: 0.5px;
      }
      .chips span { margin: 0 17px; }
      .footer {
        margin-top: 58px; font-size: 19px; font-weight: 500;
        color: #aab2c4; letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <div class="banner">
      <div id="field"></div>
      <div class="glow"></div>
      <div class="content">
        <div class="logo">
          <svg width="128" height="128" viewBox="0 0 128 128" fill="none"
               xmlns="http://www.w3.org/2000/svg">
            <rect x="6"  y="16" width="26" height="26" rx="5" fill="#d7dcec"/>
            <rect x="38" y="6"  width="26" height="26" rx="5" fill="#e4e7f2"/>
            <rect x="8"  y="50" width="26" height="26" rx="5" fill="#e4e7f2"/>
            <rect x="40" y="46" width="26" height="26" rx="5" fill="#d7dcec"/>
            <circle cx="80" cy="76" r="35" fill="#fbfcfe" stroke="#1f2740" stroke-width="7"/>
            <rect x="66" y="62" width="28" height="28" rx="6" fill="#ef7b3e"/>
            <path d="M73 76 l5 5 l9 -11" stroke="#ffffff" stroke-width="5"
                  fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="106" y1="102" x2="122" y2="118" stroke="#1f2740"
                  stroke-width="8" stroke-linecap="round"/>
          </svg>
          <span>e<span class="accent">lig</span>o</span>
        </div>
        <div class="tagline">
          Generate many images, keep the best — best-of-N selection, in pure Rust
        </div>
        <div class="chips">
          <span>best-of-N</span><span>CLIP</span><span>Stable&nbsp;Diffusion</span><span>embeddings</span><span>similarity</span><span>no-ref&nbsp;quality</span>
        </div>
        <div class="footer">
          github.com/vbasky/eligo&nbsp; ·&nbsp; generate → score → select&nbsp; ·&nbsp; MIT&nbsp;OR&nbsp;Apache-2.0
        </div>
      </div>
    </div>

    <script>
      // Deterministic scatter so re-renders are identical.
      function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
      const rng = mulberry32(20240617);
      const palette = ["#c8d1e8", "#d4dbef", "#bfcae4", "#dde2f1", "#cdd6ec"];
      const field = document.getElementById("field");
      const N = 78;
      for (let i = 0; i < N; i++) {
        const t = document.createElement("div");
        t.className = "tile";
        const size = 14 + rng() * 34;
        const x = rng() * 1200, y = rng() * 630;
        // distance from the focal centre → fainter near the middle so text stays clean
        const dx = (x - 600) / 600, dy = (y - 300) / 315;
        const dist = Math.min(1, Math.sqrt(dx * dx + dy * dy));
        const op = (0.05 + dist * 0.16) * (0.7 + rng() * 0.6);
        const orange = rng() < 0.07;
        t.style.width = t.style.height = size + "px";
        t.style.left = x + "px";
        t.style.top = y + "px";
        t.style.background = orange ? "#ef7b3e" : palette[(rng() * palette.length) | 0];
        t.style.opacity = (orange ? op * 0.8 : op).toFixed(3);
        t.style.transform = "rotate(" + (rng() * 50 - 25).toFixed(1) + "deg)";
        field.appendChild(t);
      }
    </script>
  </body>
</html>
