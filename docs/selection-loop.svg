<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="744" height="264" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- prompt pill -->
  <rect x="58" y="36" width="124" height="34" rx="17" fill="#0f172a"/>
  <text x="120" y="58" text-anchor="middle" font-size="13.5" fill="#ffffff" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">"a red bicycle"</text>

  <!-- arrows -->
  <line x1="120" y1="70"  x2="120" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="182" y1="186" x2="300" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="422" y1="186" x2="540" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="642" y1="186" x2="676" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- arrow labels -->
  <g fill="#64748b" font-size="12" font-style="italic" text-anchor="middle">
    <text x="241" y="176">n candidates</text>
    <text x="481" y="176">reward per image</text>
  </g>

  <!-- Backend (artist) -->
  <rect x="62" y="150" width="120" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="122" y="182" text-anchor="middle" font-size="15" font-weight="600" fill="#1d4ed8">Backend</text>
  <text x="122" y="202" text-anchor="middle" font-size="12.5" font-style="italic" fill="#3b82f6">the artist</text>

  <!-- Scorer (judge) -->
  <rect x="302" y="150" width="120" height="72" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="362" y="182" text-anchor="middle" font-size="15" font-weight="600" fill="#6d28d9">Scorer</text>
  <text x="362" y="202" text-anchor="middle" font-size="12.5" font-style="italic" fill="#7c3aed">the judge</text>

  <!-- argmax -->
  <rect x="542" y="150" width="100" height="72" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="592" y="191" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">argmax</text>

  <!-- winner -->
  <text x="684" y="191" font-size="14" font-weight="600" fill="#065f46">winner</text>
</svg>
