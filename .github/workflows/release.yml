name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,     os: macos-latest }
          - { target: x86_64-apple-darwin,      os: macos-latest }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc,   os: windows-latest }
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --workspace --target ${{ matrix.target }}

      # The CLI binary is named after the repository (see the [[bin]] in the
      # *-cli crate). Adjust `bin` here if you rename the binary.
      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin="${{ github.event.repository.name }}"
          cd "target/${{ matrix.target }}/release"
          archive="${bin}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$archive" "$bin"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          bin="${{ github.event.repository.name }}"
          cd "target/${{ matrix.target }}/release"
          archive="${bin}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          7z a "$archive" "${bin}.exe"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ env.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: "*"
          merge-multiple: true
          path: /tmp/assets

      - name: Checksums
        working-directory: /tmp/assets
        run: |
          for f in *; do
            [[ "$f" != *.sha256 ]] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Generate release notes from CHANGELOG
        run: |
          VERSION="${{ github.ref_name }}"
          awk -v ver="${VERSION#v}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.event.repository.name }} ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: /tmp/assets/*
          fail_on_unmatched_files: true

  publish:
    name: Publish to crates.io
    timeout-minutes: 15
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Bail if prior workflow run started < 10 min ago
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh api "repos/${{ github.repository }}/actions/workflows/release.yml/runs?per_page=5" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})][0].run_started_at")
          if [ -z "$prev" ] || [ "$prev" = "null" ]; then
            echo "No prior run found; proceeding."
            exit 0
          fi
          diff=$(( $(date +%s) - $(date -d "$prev" +%s) ))
          echo "Previous run started ${diff}s ago at ${prev}."
          if [ "$diff" -lt 600 ]; then
            echo "::error::Previous run started less than 10 minutes ago — bailing to avoid duplicate publish."
            exit 1
          fi

      - uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup update stable --no-self-update
          rustup default stable

      - name: Publish crates (dependency order, skip versions already on crates.io)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Dependency order: a crate must appear after every crate it depends on.
          CRATES=(
            eligo
            eligo-cli
          )
          metadata=$(cargo metadata --format-version 1 --no-deps)
          for c in "${CRATES[@]}"; do
            version=$(jq -r --arg c "$c" '.packages[] | select(.name == $c) | .version' <<<"$metadata")
            if [ -z "$version" ]; then
              echo "::error::No version found for ${c} in workspace metadata"
              exit 1
            fi
            http=$(curl -sSL -o /dev/null -w "%{http_code}" \
              -H "User-Agent: eligo-release-bot (https://github.com/${{ github.repository }})" \
              "https://crates.io/api/v1/crates/${c}/${version}")
            if [ "$http" = "200" ]; then
              echo "==> SKIP ${c}@${version}: already on crates.io"
              continue
            fi
            echo "==> cargo publish ${c}@${version}"
            cargo publish -p "${c}"
          done
